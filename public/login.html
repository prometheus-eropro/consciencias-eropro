<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ConsciêncIAs PROMETHEUS – Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #dff6f3, #7ce6f0);
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      font-size: 2em;
      font-weight: 900;
      margin-bottom: 25px;
      color: #0a2f33;
    }

    input {
      padding: 12px;
      margin: 6px;
      width: 260px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1em;
    }

    button {
      padding: 12px 24px;
      background: #1c9baf;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      font-size: 1em;
      transition: background 0.2s;
    }

    button:hover {
      background: #138294;
    }

    #msg {
      margin-top: 20px;
      font-weight: bold;
      font-size: 1em;
      color: red;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>ConsciêncIAs PROMETHEUS</h1>

  <input type="text" id="emailOuCelular" placeholder="Email ou celular">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="logar()">Entrar</button>

  <div id="msg"></div>

  <script>
<script>
  async function logar() {
    const emailOuCelular = document.getElementById('emailOuCelular').value.trim();
    const senha = document.getElementById('senha').value.trim();
    const msg = document.getElementById('msg');

    if (!emailOuCelular || !senha) {
      msg.textContent = "Preencha todos os campos!";
      return;
    }

    try {
      const resposta = await fetch('https://script.google.com/macros/s/AKfycbzfn4lH6YudDbDNmFmDp6tT-OF8L3ZOpTwCtAhAdNf5VW9fCKeNedPt13Nxe_fbG6b-Vg/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login: emailOuCelular, senha: senha })
      });

      const dados = await resposta.json();

      if (dados && dados.consciencias) {
        sessionStorage.setItem('cliente', emailOuCelular);
        sessionStorage.setItem('consciencias', JSON.stringify(dados.consciencias));
        window.location.href = 'area-assinante.html';
      } else {
        msg.textContent = "Acesso negado! Verifique seus dados.";
      }

    } catch (error) {
      console.error(error);
      msg.textContent = "Erro ao conectar com o servidor.";
    }
  }
  </script>
</body>
</html>
