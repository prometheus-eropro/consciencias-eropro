<script>
  async function logar() {
    const emailOuCelular = document.getElementById('emailOuCelular').value.trim();
    const senha = document.getElementById('senha').value.trim();
    const msg = document.getElementById('msg');

    if (!emailOuCelular || !senha) {
      msg.textContent = "Preencha todos os campos!";
      return;
    }

    try {
      // Etapa 1: Verificar login com senha
      const loginRes = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ emailOuCelular, senha })
      });
      const loginData = await loginRes.json();

      if (!loginData.autorizado) {
        msg.textContent = "Acesso negado! Verifique seus dados.";
        return;
      }

      // Etapa 2: Buscar consciências liberadas para esse usuário
      const consRes = await fetch('/api/listar-consciencias', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ emailOuCelular })
      });
      const consData = await consRes.json();

      if (consData && consData.consciencias) {
        sessionStorage.setItem('cliente', emailOuCelular);
        sessionStorage.setItem('consciencias', JSON.stringify(consData.consciencias));
        window.location.href = 'area-assinante.html';
      } else {
        msg.textContent = "Nenhuma ConsciêncIA liberada para este login.";
      }

    } catch (error) {
      console.error(error);
      msg.textContent = "Erro ao conectar com o servidor.";
    }
  }
</script>
